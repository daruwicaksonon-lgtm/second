<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabung Berputar 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Buat Geometri Tabung (Cylinder)
        // CylinderGeometry(radiusTop, radiusBottom, height, radialSegments)
        const geometry = new THREE.CylinderGeometry(1, 1, 3, 32);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88, 
            wireframe: false,
            metalness: 0.5,
            roughness: 0.2
        });
        const cylinder = new THREE.Mesh(geometry, material);
        scene.add(cylinder);

        // 3. Tambahkan Pencahayaan (Lighting)
        const light = new THREE.PointLight(0xffffff, 50, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040)); // Cahaya lembut

        camera.position.z = 5;

        // 4. Animasi Berputar
        function animate() {
            requestAnimationFrame(animate);

            // Rotasi pada sumbu X dan Y
            cylinder.rotation.x += 0.01;
            cylinder.rotation.y += 0.01;

            renderer.render(scene, camera);
        }

        // Responsif saat jendela di-resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
